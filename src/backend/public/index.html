<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ruach v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #111827;
  color: white;
  padding: 20px;
  max-width: 800px;
  margin: auto;
}
.card {
  background: #1f2937;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}
button {
  padding: 10px 15px;
  background: #10b981;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.progress {
  height: 8px;
  background: #374151;
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: #10b981;
  width: 0%;
}
</style>
</head>

<body>

<h1>🌬 Ruach v2</h1>

<div class="card">
<h2>🧭 Anchor</h2>
<select id="anchor">
<option>Faith</option>
<option>Learning</option>
<option>Health</option>
<option>Relationships</option>
</select>
</div>

<div class="card">
<h2>⚡ Priority</h2>
<textarea id="priority" rows="2"></textarea>
</div>

<div class="card">
<h2>✅ Habits</h2>
<label><input type="checkbox" data-habit="faith"> Faith</label><br>
<label><input type="checkbox" data-habit="learning"> Learning</label><br>
<label><input type="checkbox" data-habit="health"> Health</label><br>
<label><input type="checkbox" data-habit="relationships"> Relationships</label>
<div class="progress"><div class="progress-fill" id="progress"></div></div>
</div>

<div class="card">
<h2>🌙 Alignment</h2>
<label><input type="radio" name="align" value="yes"> Yes</label>
<label><input type="radio" name="align" value="partial"> Partial</label>
<label><input type="radio" name="align" value="no"> Drifted</label>
</div>

<div class="card">
<h2>🧠 AI Reflection</h2>
<div id="reflection">No reflection yet.</div>
</div>

<button onclick="saveToday()">Save</button>

<script>
// ===============================
// RUACH v2 FRONTEND JS (OpenAI + Cloud Ready)
// ===============================

window.saveToday = function() {
  fetch('/api/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ /* your data */ })
  })
  .then(res => res.json())
  .then(data => console.log('Saved:', data))
  .catch(err => console.error(err));
};

// 🗓 Load today's state and archive if new day
function loadToday() {
  const state = JSON.parse(localStorage.getItem("ruach-today") || "{}");
  if (!state.anchor) return;

  document.getElementById("anchor").value = state.anchor;
  document.getElementById("priority").value = state.priority;

  for (let h in state.habits) {
    const checkbox = document.querySelector(`[data-habit="${h}"]`);
    if (checkbox) checkbox.checked = state.habits[h];
  }

  if (state.alignment) {
    const radio = document.querySelector(`input[name="align"][value="${state.alignment}"]`);
    if (radio) radio.checked = true;
  }

  updateProgress();
}

function archiveIfNewDay() {
  const today = new Date().toDateString();
  const lastDay = localStorage.getItem("ruach-last-day");
  if (lastDay !== today) {
    const history = JSON.parse(localStorage.getItem("ruach-history") || "[]");
    const state = JSON.parse(localStorage.getItem("ruach-today") || "{}");
    if (Object.keys(state).length) history.push(state);
    localStorage.setItem("ruach-history", JSON.stringify(history));
    localStorage.setItem("ruach-last-day", today);
    localStorage.removeItem("ruach-today");
  }
}

// ===============================
// Save today's state & cloud sync
// ===============================
async function saveToday() {
  const state = {
    anchor: document.getElementById("anchor").value,
    priority: document.getElementById("priority").value,
    habits: {
      faith: document.querySelector(`[data-habit="faith"]`).checked,
      learning: document.querySelector(`[data-habit="learning"]`).checked,
      health: document.querySelector(`[data-habit="health"]`).checked,
      relationships: document.querySelector(`[data-habit="relationships"]`).checked
    },
    alignment: document.querySelector(`input[name="align"]:checked`)?.value || null
  };

  localStorage.setItem("ruach-today", JSON.stringify(state));

  // Cloud sync
  try {
    const response = await fetch("/api/daily", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(state)
    });
    const data = await response.json();
    console.log("Saved to backend:", data);
  } catch (err) {
    console.error("Failed to save to backend:", err);
  }
}

    // 4️⃣ Trigger AI reflection immediately after saving
    await generateReflection();

    sendNudge("Today's state saved and reflection updated!");
  } catch (error) {
    console.error("Save failed:", error);
    sendNudge("Failed to save today. Check your connection.");
  }

  // 5️⃣ Update progress bar
  updateProgress();
}

// ===============================
// Smart Nudges
// ===============================
if (Notification.permission !== "granted") Notification.requestPermission();

function sendNudge(message) {
  if (Notification.permission === "granted") {
    new Notification("Ruach 🌬", { body: message });
  }
}
setTimeout(() => sendNudge("Set your Anchor for today."), 5000);
setTimeout(() => sendNudge("Evening reflection time."), 1000 * 60 * 60 * 8);

// ===============================
// Cloud Sync
// ===============================
async function syncCloud(state) {
  try {
    const response = await fetch("/api/daily", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(state)
    });

    if (!response.ok) throw new Error(`Server returned ${response.status}`);
    const data = await response.json();
    console.log("Cloud sync successful:", data);
    sendNudge("Your state was synced to the cloud!");
  } catch (error) {
    console.error("Cloud sync failed:", error);
    sendNudge("Cloud sync failed. Please check your connection.");
  }
}

// ===============================
// AI Reflection (OpenAI)
// ===============================
async function generateReflection() {
  try {
    const response = await fetch("/api/daily/last7");
    if (!response.ok) throw new Error(`Server returned ${response.status}`);

    const result = await response.json();
    const summary = result.data;

    if (summary.length < 3) {
      document.getElementById("reflection").innerText = "Not enough data for reflection yet.";
      return;
    }

    const aiResponse = await fetch("/api/ai/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ summary })
    });

    const aiData = await aiResponse.json();
    document.getElementById("reflection").innerText = aiData.insight;
    sendNudge("AI Reflection updated!");
  } catch (error) {
    console.error("Reflection generation failed:", error);
    document.getElementById("reflection").innerText = "Could not generate reflection.";
    sendNudge("AI reflection failed. Check your connection.");
  }
}

// ===============================
// Progress Tracker
// ===============================
function updateProgress() {
  const total = document.querySelectorAll('[data-habit]').length;
  const completed = Array.from(document.querySelectorAll('[data-habit]'))
                        .filter(cb => cb.checked).length;
  const percent = total ? (completed / total) * 100 : 0;
  document.getElementById("progress").style.width = percent + "%";
}

// ===============================
// Initialization
// ===============================
loadToday();
archiveIfNewDay();

</script>
</body>
</html>
